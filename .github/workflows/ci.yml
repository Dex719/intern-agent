# CI: перенеси этот файл в .github/workflows/ci.yml (через веб-редактор GitHub
# или локально), после этого он начнёт запускаться на каждый push/PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Tests
        run: PYTHONPATH=src pytest -q
